  text: 重刊道藏輯要
  hash: sha256:6dc9a1411114c50ffda3e182b42e4bf40225ca64b0f8ae0fa2bf04047189bc26
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0056_CK-KZ_02p001a, image: JY188/CK-KZ_JY188_02p001a.png}
body:
  text: 重陽教化集終南山重陽子王喆譔遺丹陽一别終南水竹村家無兒女亦無孫三千里外尋知友引入長生不死門丹陽繼韻得遇當歸劉蔣村眞人言我在終南山劉蔣村住庵故有是句黜妻棄妾屏兒孫攀緣割斷雲遊去誓不回眸望舊門贈丹陽只爲迎風雀目馬都緣戲水錦鱗魚丹陽先生謹繼韻幸遇須當擒意馬忻然作箇化鵬魚重陽眞人見丹陽先生稱自幼患雀目眞人曰誤犯誤犯遂更其句云只爲迎風千里馬都緣戲水一頭魚丹陽先生又繼韻玉線牽出眞野馬金鈎釣出大鯨魚遇仙亭俗山名急急迴頭得得因由物物更不追求見見分明把箇般般打破優游淨淨自然瑩徹清清至是眞修妙妙中間通出入玄玄裏面細尋搜了了達冥幽穩穩拈銀棹惺惺駕般若神舟速速去超彼岸靈靈現住瀛洲丹陽繼韻喜喜蓬頭達達根由永永誓不貪求漸漸歸于正覺申申燕處優游萬萬塵緣識破專專志做持修遇遇風仙傳口訣疑疑滌盡更何搜燦燦不昏幽玉玉金光結心心願做渡人舟累累功成行滿眞眞去訪瀛洲拆字口號哥宜甫丹陽俗字宜甫是同和髓麰精會得麽一幽微玄妙處誠須認入庵歌拆起哥字丹陽繼韻從教訓鍊沖和訣傳來是恁麽悟妻如活鬼子心常喜鼓盆歌拆起可字五言詩攢三字馬相見喆相戀處庵中做方便丹陽繼韻扶風見重陽戀恰應時出家便七言詩藏頭拆字人姓馬字宜甫勸便將精緊固禀心依肯自匡風歡喜庵中住拆起主字丹陽繼韻遇投眞辭運甫運甫乃丹陽第四郎字也心緊把精神固中不說是和非間木金空裏住拆起一字贈丹陽眼蓬頭臉上紅牽烏兔在西東方一得金鄕覷說伊予總害風拆起蟲字丹陽繼韻滅尸亡心性紅系逗引出山東金間隔成玄寶水三川秀馬風拆起蟲字贈丹陽我逍遙惺復洒秦東海來游冶星常許作詩詞命長生宜甫馬拆起與字丹陽繼韻我本師做瀟洒火溉濟如陶冶口傳來最妙玄上么么風害馬同前贈丹陽氣相生眞喜悅田震地通明哲傳金訣玉科靈性圓成歸日月拆起二字丹陽繼韻曜相交眞自悅中朗徹知人哲傳妙訣性靈靈朵金花捧明月同前緣丹陽再要展修庵舍作是詩藏頭拆字居塵屋不須寬假搜眞處內看擊正堪同步躡聞不喜再修完初一點尋清淨去三田要運般上逍遙超彼岸分明了赴仙壇拆起土字丹陽繼韻生眼界外便平聲寬識爭知向裏看視姹嬰雙喜悅觀神氣兩全完來合𢬵須當𢬵了那般得這般載靈光通出入然飛上會星壇拆起一字三光會合俗名韻令扶風且住聽予言語決定相隨去些兒少慮對公先訴遇逢艱阻飢寒雨露有恓惶處眉頭莫要聚長生好事只今堪做何必候時數青巾戴取更衣麻布得離凡宇入雲霞路功昭行著眞師自肯度丹陽繼韻鄕關不住謹依教語脫身要歸去何思何慮略而分訴任他魔阻丹誠顯露眞心定處雲朋霞友聚修行美事在乎懃做九轉大功數無中要取箇中敷布得瞻眉宇可登雲路性靈昭著神仙自是度勸丹陽與弟子運甫和睦道非常物物和傳心印接金科筲俗器皆休作我塵容好自磨女閉門收本業牛耕地出高坡膚血肉俱無認辱方能呼馬哥拆起可字丹陽繼韻從師勸弟兄和訣長生忍辱科稼善芽添感應田惡業頓消磨羊石虎餐瓊葉馬木人上王坡顯中央眞氣結人便是馬風哥同前贈丹陽人雖巧怎生通子王風好去東上火焚緣泄漏中金聚見玲瓏漿自飲刀圭出嶺獨登性命同裏無言公莫怪頭一點發顏紅拆起工字丹陽繼韻系不斷性靈通子先收西與東裏金生緣溉濟中火結得玲瓏蟠虎遶乾坤朗白風清書夜同口相傳唯這箇精鍊氣大丹紅拆起糸字贈丹陽系不斷做神仙上清風月正圓念眞經無不應持妙訣謹擎拳當玉簡宜遵道載金冠自合天抵般般唯願領公便得好因緣拆起糸字丹陽繼韻分卦象是風仙下扶風果未圓訣傳來當養性魔咄去勝揮拳持象管書符簡射銀蟾耀洞天道無形歸不二能通得達良緣拆起彖字贈丹陽上半年分下半年誰知十二箇周天日時亦有通更改歲月惟無合倒顛會使心中神熠燿能傳性上壽遷延守功守行眞師至度作逍遙物外仙丹陽繼韻尋思急景急凋年怎敢因循失補天鍊藥須教鉛汞結收心不放馬猿顛命燈清爽精光銳性燭澄明壽筭延功行積成無漏果超然作箇大羅仙贈丹陽認取這般爲的祖休要背爺更覓父會得之時且小心會不得時大着肚丹陽繼韻神是宗兮氣是祖通斯玄妙因師父如今認得本來眞豈敢依前空養肚贈丹陽修行先要識傍偏今日分明說與賢認取根源成了了便教性命永綿綿丹陽繼韻從來無黨亦無偏幸遇修眞出世賢賜我無爲玄妙訣心清意淨氣綿綿贈丹陽四般假合終歸土一箇眞靈直上天不滅不生超達去無爲無漏大羅仙丹陽繼韻傳得無爲無漏果何愁無分不昇天三田清淨三丹結出自風仙决做仙心月照雲溪俗驀山溪一身之內二物成眞寶著意辯三才列四象五行化造六賊門外七魄莫狂遊八卦定九宮通功行十分到十分修鍊九轉成芝草八位上仙知救七祖遠離六道五年功滿四大離凡塵三清路二童邀抱一歸蓬島丹陽繼韻一心離俗二氣調和寶清淨聚三光四時花五方運造斷除六慾不使七情牽持八戒九關通十載功須到十年鍛鍊九變金光草八脉總和匀有七聖六丁助道五行咄出四假不中留禮三清成不二一性投仙島心月照雲溪一身得得好把逍遙做莫戀色和財又名利榮華不顧心中逸樂管取絕憂愁處清凉無熱惱事事成開悟任行任住坐卧皆從所玉訣與金科這兩般頻頻覽覷玄機密妙訣許自陳明結圓成攢瑩玉捧入長生路丹陽繼韻我今得遇便向難中做決要脫家緣細尋思不堪迴顧黜妻屏子絕利更忘名離去聲鄕關歸物外稱箇超然悟馬猿捉住修葺眞園所豈敢戀冤親要龜蛇時時厮覷援平聲其性命出自太原公掌元初成圓相踏碎根源路心月照雲溪無常二字說破教賢怕百歲受區區細思量一場空話躭他火院剛恁苦熬煎早收心採黃芽藥就難酬價居山寂靜悄悄實瀟灑斷念去貪嗔把意馬心猿繫下神清澄淨一點鎮長明無爲裏作功成不許誇奸詐丹陽繼韻死生生死鎮日常驚怕忽爾遇風仙便說開些兒妙話忻然頓覺猛烈棄家緣向無中做經營烹鍊丹無價投眞得趣自是增惺洒方寸要清凉把塵緣般般放下頤神養氣心月照雲溪處無私憑眞實無諂亦無詐黃鶴洞中仙俗喝馬卜筭子正被離家遠衰草寒烟染水隔孤村兩三家你不牽上他馬獨立沙汀岸叫得船離岸舉棹波如練漁叟停船問行人你不牽上他馬月照江心晚丹陽繼韻火院須當遠塵事難爲染因遇風仙棄冤親做箇投眞馬得得超彼岸旣達逍遙岸鍊氣如素練專下工夫分假眞做箇惺惺馬悟道何愁晚黃鶴洞中仙夜宿山村店不覺頻嗟嘆獨自尋思告他誰只聞得那馬耳畔頻嘶喊國泰兵戈偃頃畝農夫羨不動槍旗動酒旗你不放他那馬兩國無征戰丹陽繼韻身是精神店無箇人曾嘆舍漏垣頽主翁行也不見他馬怎得聞嘶喊我悟塵頭偃富貴無心羨離坎相交玄更玄般運動也馬來往如同戰黃鶴洞中仙眞人訓先生法名通一全道道號無憂子卜算詞頻話莫放猿兒耍疾速先須調姹嬰全道馬好把家緣捨一箇眞惺灑雲路堪同跨自在逍遙永厮隨害風馬管取玲瓏也丹陽繼韻拯救扶風話逗引扶風耍故遣扶風顛更狂扶風馬家累扶風捨業火扶風灑雲鶴扶風跨這箇扶風靈更靈扶風馬眞稱扶風也黃鶴洞中仙詠瓦𤮴瓦𤮴泥中寶巧匠功成造修鍊之時向鑪中內有金光照有耳何曾曉有口何曾道携向街前叫一聲莫教抛撒了丹陽繼韻瓦𤮴眞眞寶須假良工造十二時中下火燒自有三光照大肚物能容圓正通明道清淨法身牢護持不敢破壞了無夢令贈丹陽坐卧住行有别自是逍遙做徹大道本來眞驀地哂中歡悅無說無說勘破春花秋月丹陽繼韻人我兩無分別箇內須教瑩徹營養本來如漸覺眞歡眞悅親說親說得見洞天明月無夢令春暖迴頭不肯直待九冬冼冼凍得不惺甦丹藥難爲救拯將㱡將㱡卻覓長生且等丹陽繼韻入道休愁不肯迴首不過寒冼一志不榮身願把眾生提拯救㱡救㱡救㱡心行平等無夢令啜盡盧仝七椀方把趙州呼喚烹碎這機關明月清風堪翫光燦光燦此日同超彼岸丹陽繼韻不論趙州幾椀更不盧仝請喚禱告太原公免了睡魔厮翫明燦明燦得見長生道岸無夢令此日方知顛倒一切因心善造決烈便迴頭換面更名堪討全道全道正好安排鑪竈丹陽繼韻師父說開顛倒别是一般運造外事削來無便得裏頭尋討大道大道清淨身爲丹竈無夢令藏頭詠圍棋下圍棋取樂閒白烏交錯者好關機度輸嬴憂謔作言作看這番一着拆起目字丹陽繼韻視手談歡樂子觀之迷錯木運玄機箇卻爲戲謔作言作怎解搜這着同前滿庭芳藏頭覓殘餘蒙庵主邀便出黃梁中生秀唯我最堪當內沖和九轉般運二氣飄颺飈動樓上下出入吐光芒殃取象滋羊味酒醴俱忘靈眞一點圓照珪璋印白蓮秀艷清淨别恁馨香華靜衣前引齊唱滿庭芳拆起方字丹陽繼韻感眞人然下訪是得悟黃粱精麥髓弟子謹供當上田田難種懇告神怎飛颺仙道初心善無刺亦無芒而無死壽珠能語句句難忘懷眞實寶肯換珪璋內金花自綻知得别是清香常謹談妙用不久性芬芳拆起方字滿庭芳藏頭莫驅馳公全道來眞性明光誰知得便是水中霜應相從相見人悟物物俱忘中有華耀處怎奈被雲藏詳語銳田起屋震地安房教認清外别藴馨香射崑山片玉風共誰話琅琅辰動陽佳節金菊滿庭芳拆起力字丹陽繼韻謝王公今身脫田耕出祥光然省悟汞內結鉛霜識塵緣恩愛須當念斷情忘猿退乎者也從此便潛藏臧堪可用分修葺玉洞金房通得玄妙知味聞香日逍遙豁暢申處同話琅琅辰好端午正玉性自然芳拆起方字贈丹陽歌藏頭謁扶風庵要住人歡喜心神許前鉛汞卯通孜後刀圭酉厮助看金飛過曲江蟾玉走超玄步年泗十五輪明月圓光覩公眉宇準規模使雲霓遮遏忤裏白蓮向日開前黃菊重陽猜瞳閃閃輝輝赫燼炎炎燦燦鬼魅盡銷分地戸蟲皆滅現天台傳義相偎上人人物外迴子隨予師禮訪知銀海載蓬萊拆起來字丹陽繼韻時一見相邀住公不阻忻然許予認死心自灰滅煙消道相助收神氣與精光兀騰騰縱雲步行伍通五靈心月漸堪覩人巧詐騁機模也留心難逆忤前子後坎離開闡門扃慧目猜龍建甲金方皓虎起庚木德瑰走金飛通九戸亡蟲滅顯三台傳祕自偎他火院便頭迴乎者也從今罷知别有好蓬萊同前四言長篇一箇朱郎卽是姓也不要思量如不去時彼此清凉如要去時多搜藥方二人同行路上糇糧我若獨行依舊飄颺恐公作伴卻惹愁腸如依得我萬事無妨怕甚暮雨懼甚晨霜也無煩惱也没恓惶也無妻妾也無爺娘也無財產也無家鄕任雲任水乞食爲長尋師訪道只爇心香丈夫剛志豈有彷徨今日明日不保死亡堅心向道陽助吉昌詐心誑道陰降百殃向道則生背道則亡願公早悟請公細詳丹陽繼韻此箇仙郎得遇忖量始知祕密斡挑炎凉收聚木德耕種金方伏降我相求乞道糧精宜牢固神要飛揚逍遙坦蕩散盡愁腸逢魔逢咀無礙無妨懼甚霪霖怕甚嚴霜無煩無惱無恓無惶戀甚妻妾藉甚爺娘捐棄財產違别家鄕定無見短決要行長以志爲主以心爲香男兒决烈意没彷徨若是退道卽時死亡身遭苦楚家無吉昌永沈下鬼萬劫受殃形骸俱喪魂魄俱亡立此盟誓請師審詳贈丹陽得覽盟言眞决烈信心消盡平生業海濱知友是扶風從今堪可隨王嚞隨王嚞在關中名並兩吉字知明到寧海又添一吉字智明喜齊肩同行同坐各搜玄水雲遊歷歸何處好向關西謁陸仙謁陸仙舊知友三箇逍遙天下走無思無慮覓無爲開舒暢飲長生酒長生酒勝醍醐自然盈滿不須沽常令醉後成顛倒每到醒來任吸呼任吸呼行正道養就金花玉芝草大家折得插崑崙超然同赴蓬萊島丹陽繼韻得遇修行當猛烈不造新殃消舊業心中疑網豁然開從令永永師王嚞師王嚞攀齊肩埋光蓄響處玄玄常淨常清龍虎吼忽然驚動箇胎仙爲的友何必尋人相伴走逍遙坦蕩每何爲閑閑恣飲無中酒無中酒賽醍醐能駐童顏無價沽滌除塵境通顛倒灌溉靈苗悟吸呼悟吸呼眞常道玉中營養金光草功成紫詔下天來大家同去居蓬島金蓮堂俗惜黃花藏頭家自悟今觀覩扶風安手腳未知門戸鬼作乖踈下如何做人來金相覷裏爲誰主風語汝還嬰兒復姹寶瓶牢固聖說因緣系能結慕眞洪登雲路拆起各字丹陽繼韻傳心悟中堪覩嬰嬌并女姹會封門戸滅更蟲銷木相交做事絕財不覷內箇中主從識汝昇火降自是丹陽堅固往與今來人誰肯慕子明通玄路拆起口字報師恩俗瑞鷓鴣地仙中仙與天仙認得三田月正圓自己若能施笑面那人未肯便興拳撇橈弄腳虛粘地猛烈迴頭合上天若被利名牽絆住十分失了好因緣丹陽繼韻弟兄讎解遇風仙從此和同喜面圓不習儒風不叉手便遵道教便擎拳九玄决救離於地七祖超昇得上天更對師前當發誓化人修善結良緣贈丹陽歌眉壽方將四十六諸餘於己常知足三田養取好明珠玉戸收藏眞瑩玉休打坐莫行功捉取身中西與東致使水源千道緑便令心性一團紅莫亂尋依此做天邊飛走烏和兔從今識破這玲瓏速鍊行持休暮故搜妙妙問玄玄只要心中只自專退己進人功行著自然脫殻做神仙丹陽繼韻重陽師父眞三六許我將來爲上足玉鑪裏面鍊精金金鼎中間收美玉行與坐自然功斡旋南北與西東杳默昏冥火棗白澄清湛寂水銀紅絕搜尋無作做蓋因傳得眞烏兔閑修雲洞幸知新肯對書窗再温故通妙妙達玄玄謹持謹守謹精專積行累功當闡教虔誠一志繼風仙折丹桂贈丹陽氣財酒色相調引迷惑人爭忍因斯染患請郎中鬼使言你且儘不須把脉休頻診死病今番準這迴須去不推辭復勾追文貼緊丹陽繼韻父師痛教頻頻引在俗心寧忍須當酒色氣財捐到如今有甚儘沖和氣脉何勞診一志修行準參隨鶴駕縱雲遊離鄕關心意緊折丹桂近來陰府心寒凛對判官詳審高呼鬼使急拏拏不凌遲更待甚鑊湯浴過鐵床寢銅汁頻頻飲高聲禱告且饒些後番兒不敢恁丹陽繼韻養家想著心先凛何必重重審殘軀已過下坡年不灰心更候甚家緣撇下安然寢飢渴求餐飲天機祕訣暗傳來外琢磨直要恁折丹桂害風故著言談引全道應難忍榮華攀愛已捐除縵調和教你儘好將心脉時時診道服須支準前篇詞意請消詳這番兒催得緊丹陽繼韻父師不住威言引弟子忻然忍尋思世事悉皆空不灰心且自儘悟來八脉閑調診虎嘯龍吟準修完性命敢遲遲念前程生死緊勸丹陽戴青布華陽巾於家心堅久於家未脫離都緣三字絆使得一身疲怎識鉛和汞難分坎與離青巾如戴起方認紫靈芝丹陽繼韻慧劍揮三子家緣要出離不教形體苦肯使氣神疲專志搜鉛汞留心認坎離青巾歡喜戴清淨種靈芝見丹陽每和詩詞篇篇猛烈有凌雲之志然未識心見性難以為準故引古詩云一種靈禽舌軟柔高枝獨坐叫無休聲聲只道燒香火未必心頭似口頭丹陽繼韻口善心慈性亦柔萬種塵緣一旦休若是心口不相應願受鐵鉗拔舌頭贈丹陽三移床三更飯為題絶句故把床移飯改移三三如六怎生知教公會得雙關事雪裏瓊花總是誰丹陽繼韻能可移山志不移蓋因玄妙頗通知雙關未曉須求告除了師父更問誰
