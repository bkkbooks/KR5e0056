front:
  text: 重陽教化集卷之三交六
  hash: sha256:761f3ecb74d397adfc61a3305702ecd5f1167ca2b07a793a5ff5e7cf73b756a0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0056_HFL_003-001a, image: hfl/0796/0796-033.png}
body:
  text: 終南山重陽子王哲撰紀夢古道心中性三田用內觀九文陽極數一字了然看開德神應爽扶風氣自團於豫真有助精耀入雲端丹陽繼韻內境勝外境如何向裏觀不勞雀目視須用慧眸看丹藥清清秀神光燦燦團九重陽焰捧真性自然端遇仙槎鰲魚海裏遊首尾長搖擺百日下金鈎釣出娑婆界應無離水憂鵬化扶風快隨我上青霄同赴龍華會丹陽繼韻迷迷苦海遊緣甚塵拋擺深謝本師鈎釣向關西界心無喜與憂化道崇真快未敢上丹霄且結金蓮會風馬兒意馬擒來莫容縱常隄備璫滴琉玎被槽頭猢猻相調弄蹄攢耳舉早臨風璫滴琉玎椿上韁兒緊纏鞚這回你璫滴琉玎待馴良牽歸白雲洞逍遙自在更不肯璫滴琉玎丹陽繼韻意馬顛狂自由縱來往走璫滴琉玎更加之心猿厮調弄歌迷酒惑財色引璫滴琉玎幸遇風仙把持鞚便不敢璫滴琉玎待清清堪歸雲霞洞渾身白徹再不肯璫滴琉玎趕出丹陽不得在金蓮堂住當日令上街求乞分梨十化是前年天與佳時主自然為甚當初不出離元來直待結金蓮萬年春十化分梨我於前歲生機構傳神秀二人翁母待教作拿雲手用破豫心笑破他人口從今後令伊依舊且伴王風走丹陽繼韻悟徹梨分常清常淨新營構神添秀食其真母展出拿星手從此收心磨琢慵開口通前後始知元舊參從風仙走報師恩藏頭言云語莫聽聞眼味香不屬君內減除人我相前無有死生分圭和合憑三照水焚燒按九雯又武平清淨出頭臨月弄祥雲拆起云字丹陽繼韻云言語已曾聞下山侗再告君訣傳來成造化情咄去沒毫分圭爛飲醺醺醉卯相吞燦燦雯義顯彰真寶瑑京山上箇眠雲同前詩藏頭詢修煉好追尋寸飈光寸寸金得果成無漏果分音韻有緣音輝月耀三田廕魄陽魂九轉臨位玲瓏真性鈺花臺上倚瑶岑拆起今字丹陽次韻次祖宗決要尋珠出自玉和金靈玉貌當窮究轉金丹證好音裏金澄心地朗中玉瑩性光臨傳玉印金科訣透玉金結寶岑同前蓬萊閣俗秦樓月藏頭溟漠令忘了登飛閣登飛閣人自省身居銀廓能俱養靈丹藥槎穩駕銷諸惡銷諸惡頭一點肯教牢落拆起水字丹陽繼韻攢三拆字漠洗滌蓬萊閣蓬萊閣浮動撼搖瓊廓爐鍊丹陽藥鎮日精神惡精神惡鈺得訣無墮落和韻清清漠漂漂運轉蓬萊閣蓬萊閣盈盈箇內即非凡廓炎炎火鍊超升藥時時虎嘯龍吟惡龍吟惡真真驚起永無沈落和韻雲煙漠往來浮動蓬萊閣蓬萊閣虎龍蟠繞飛升靈廓自然結就金丹藥亘初真性難生惡難生惡功成行滿得歸碧落青蓮池上客俗青玉案攢三拆字鎖户真成也百朝惺灑冰餐非苟且玄妙就中超奲馬眸粘惹恩愛俱齊捨間遊冶教余同幽雅仙子共成修寫馬明星下丹陽繼韻財寶俱捐也億些瀟灑真修無苟且調暢自然舒奲馬回公惹爐煉丹難捨功如冶山侗成清雅神彩莫能摹寫馬天高下青蓮池上客但詞中有喝馬令丹陽行行坐坐要唱元初一得從初遇便端正昭彰著轉作重陽晨彩煦晴空來往碧霄堪住瓊馬駙引入長生步靈光不動神光聚便攢簇銀霞護滿插金花頻返顧青衣鸞鶴共同來赴瑶馬駐般在清涼路丹陽繼韻馬風忽爾風風遇自然得昭然著協氣橫橫和氣煦汞鉛交結虎龍蟠住玉馬駙相曳雲霞步根源寂寂靈源聚元神顯天神護道可成兮丹可顧青蓮池上客來同赴金馬駐直入蓬萊路青蓮池上客亘初獨許能騎坐這駿駟從牽拖直走盤旋雙慶賀三山骨健力筋偏大馬輔佐萬丈洪崖過謝伊馳出深坑禍衒玉轡金纓嚲喊霧嘶風遊水火月華前面四蹄輕鎖馬負荷與我成因果丹陽繼韻將來一志環墻坐沒水漉并泥拖旦望何須人拜賀有心做小無心做大馬自佐銷滅從前過淨清力壯無災禍見祥雲朵頭嚲玉户金門封爝火青蓮池上客來開鎖馬感荷得得真功果青蓮池上客上元看輥燈毬上元景致真堪看更片片行雲散現出天如青玉案放開心月慧燈明照兩曜交光燦毬粧七寶玲瓏焕把性燭當中按一對金童呈手段瓊杆推轉順風歸去輥入蓬萊觀丹陽繼韻元宵內景間間看見雲霧風吹散洞裏天晴如碧案一輪心月十分明更性燭非常燦靈臺結箇燈毬焕慧照中間按不使三尸分片段青蓮池上客來推耍輥入長生觀黃鶴洞中仙俗卜算子卜算詞中算卦象分爻彖海島專尋知友來堪把扶風唤莫怪頻磨難只要公明燦決定堅心沒惱愁永結長生伴丹陽繼韻得遇無思算自是能明彖極謝風仙特地來把我專專唤要脫輪回難鍛鍊神光燦真樂真歡永沒愁願作雲霞伴黃鶴洞中仙暗裏修持做不合名張露却使人人轉敬欽所以難停住謹對扶風訴結伴關西去卓箇庵兒纍行功同步煙霞路丹陽繼韻清淨功夫做自是生玄露密灑靈苗溉紫芝漸覺氣神住謹謹須當訴決定參隨去物外勤修大藥成同上蓬萊路黃鶴洞中仙修鍊不煩忙自有人來遇已與白雲作伴儔常作詞和賦淨裏轉恬然歡喜回光覷一箇青童立面前捧出長生簿丹陽繼韻知味又聞香因得非凡遇更説祖師兩箇來教我修行賦一志訪秦川鄉井寧回覷火滅煙消心死灰名挂神仙簿黃鶴洞中仙前後各喝馬一聲趕退日中烏捉取月中兔便著晶光覆了身金馬住方是重陽做交位顯真功换質成真趣到此還知自在遊玉馬去走入雲霞路丹陽繼韻癸卯到人間本是非凡兔因為玲瓏罰下來馬氏住願再修行做復遇害風仙傳得深深趣黃鶴洞中仙道成馬風去直指蓬萊路黃鶴洞中仙一匹好驊騮精彩渾如畫却被銀鞍縛了身著絆馬怎得逍遙也不若騁顛狂掣斷韁無挂擺尾搖頭廄櫪違做野馬自在成遊冶丹陽繼韻一箇本來容妙手應難畫風貌清嚴神彩英無意馬永永安間也浮利與浮名心上何曾挂黃鶴洞中仙子成乘雲馬出入常遊冶黃鶴洞中仙信任水雲遊忺放靈猿耍要去隨霞恣害風乘良馬穩坐香羅帕南北與東西選甚高和下處處來回得自如呈弓馬會把明珠射丹陽繼韻因遇出囂塵終日常顛耍狂舞狂歌任自然無意馬收得靈靈帕真水涌來高真火降來下黃鶴洞中仙要成扶風馬兩曜交光射黃鶴洞中仙此箇真真也瑩徹靈臺也出入虛無縹眇間騎風馬信任飄颻也占得惺惺也光耀明明也來往晴空碧落中乘雲馬自在逍遙也丹陽繼韻大悟明明也大智間間也大道行行應自然風風馬永永逍遙也大水高高也大火炎炎也大藥輝輝晃寶瓶真真馬得得長生也黃鶴洞中仙在金蓮堂每自唱此詞須自頂禮謂丹陽曰我臨化時説與汝等初見青鋼劍尸內曾加點木上安來出一絲乾馬占害後隨風颭得此修行漸日日頻頻檢暗喜歡時只自知天馬贍與我長生驗丹陽繼韻傳得清虛劍心內深深點木上金絲來往牽馬風占更把風搖颭卦象常推漸功行時時檢黃鶴洞中仙要成馬風贍日有真靈驗黃鶴洞中仙藏頭算詞中話上甘津灑養靈煙火養蓮意馬院俱齊捨內丹無價在山邊挂有屯蒙王線縫野馬月同安下拆起卜字丹陽繼韻日風仙話我惺惺灑去關西闡妙玄么馬宅須當捨利子無價事心難挂德方而蓍德圓口馬月齊高下拆起一字玉爐三澗雪決烈修行要猛存亡莫擬先生心田可否自親耕休賴他人僥幸出離須憑福幸捨家迷裏難行空宵愁起滴長更尋甚金山銀礦丹陽繼韻火院出離勇猛發心急救殘生丹田難仗本師耕豈敢常懷徼幸得遇明明有幸通玄暗暗勤行便教日午打三更玉裏掏開金礦玉爐三澗雪藏頭引卧於寧海將宜甫為憑交霞友做雲朋朗分明為證定便除色欲神玄牝清澄升火降兩相吞內敢言遊泳拆起永字丹陽繼韻别鄉關寧海持真實為憑懷三教作良朋內日光為證悟清清淨淨知湛湛澄澄中養火虎龍吞訣傳來遊泳同前黃鶴洞中仙藏頭兆看余燈鍊陽周鏡照他人返逼驅兒省下清中瑩艷出銀釭面菱花靜似韜光不騁馳兒惺內觀真景拆起京字丹陽因燈有自悟謹繼前韻裏悟傳燈鍊真如鏡把光輝滿載驅風省視風輪瑩內顯瓊釭面靈童靜肯婪塵復載馳風惺月仙家景同前定風波萬萬人中這箇人忽然自悟説良因恰似白蓮花一朵尖新泥沙脫了出迷津邀住清風開嫩臉朗窺明月作毗鄰住向空中勝馥郁靈真此時占得四時春丹陽繼韻做箇逍遙出世人都緣傳得好根因收聚瓊花香馥郁新新自然不住飲甘津便把虛無常作伴更將清淨永為鄰貪養胎仙寧著假真真真真能占萬年春超彼岸凡軀莫藉把惺惺了了自然明明構架行住坐卧須要清清間暇氣神和結成珠堪教化張弓舉箭能親射紅心正中趕退周天卦垛貼中間迸出霞光無價五行違脫陰陽超造化丹陽繼韻家緣不藉遇風仙傳得修補清虛之架懶裏尋慵慵裏更尋間暇上街來除我相先乞化木人箭指雲溪射覺正中周天通明八卦見粒神丹燦爛果然無價水雲遊訪秦川行教化三州五會化緣榜竊以平等者道德之祖清靜之元首看萊州終歸平等為玉花金蓮之根本作三光七寶之宗源普濟群生遍拔黎庶銀豔沖盈於八極彩霞蒸滿於十方漸生良因用投吉化有緣固蒂無果重生人人願吐於黃芽箇箇不遊於黑路夫玉花者乃氣之宗金蓮者乃神之祖氣神相結謂之神仙陰符經云神是氣之子氣是神之母子母相見得做神仙起置玉花金蓮社在於兩州務要諸公認真性養真氣諸公不曉根源盡學旁門小術此乃是作福養身之法並不干修性命入道之事稍為失錯轉乖人道諸公如要修行飢來喫飯睡來合眼也莫打坐也莫學道只用塵凡事屏除只用心中清靜兩箇字其餘都不是修行諸公各懷聰慧每齋場中細細省悟庶幾不流落於他門功行乃别有真功真行晉真人云若要真功者須是澄心定意打疊神情無動無作真清真靜抱元守一存神固氣乃真功也若要真行者須是修仁藴德濟貧救苦見人患難常行拯救之心或化誘善人入道修行所行之事先人後己與萬物無私乃真行也伏願諸公早垂照鑒重陽教化集卷之三後序太上有言曰吾所以有大患者為吾有身及吾無身吾有何患蓋古之至人尚且以身為纍況於其身之外者乎且家盈百口徒益勞生室纍千金難逃化物可不諦惟泡幻漸遠世緣故當滌去根塵獨露全體其有寂心暫住熟境未除火宅炎炎徒起亡家之念仙都杳杳妄興脫屣之懷不念玉蘂金蓮豈産行尸之腹瑶臺絳闕肯容舐痔之人自非澡雪神情捐棄塵纍則何足以仰膺師訓深造道樞從乎汗漫之遊達彼逍遙之趣惟我丹陽真人冰清玉立淵渟谷虛視富貴如涕洟等聲名于桎梏嘗遇重陽真人親受祕旨所謂目擊心會色授神與者矣而重陽公又復著為詩詞發明真要丹陽公隨機酬和如響應聲前後僅數萬言辭質而義眀言近而旨遠其勤勤懇懇如此者蓋欲指示學徒易為開覺故也其門人靈真子朱抱一等相與裒集編次計三百餘篇離為三卷嘗請諸其師而名之曰下手遲曰分梨十化曰好離鄉集既成一時修真之士共珍祕之惟恨得見之晚一日其門人靈元先生衛公携所謂靈真子朱抱一者奉是集而來謂余曰此吾之師重陽丹陽二真人唱和集今好事者傳寫之不暇竊惟此編真詮妙論了見古人直截下手處實為昏衢之指南儻獨擅于己而不廣其傳者不惟有負吾師著述之意亦豈仁人之用心哉有志于道者誠所不忍也吾將刊木以貽諸同志前此雖已有總序子其為我各為之引滋辭以不敏非特不足以發揚玄奧恐適以為贅疣之纍耳況此集一出將見如夜光尺璧紫芝瑞雲璀璨煙爍人爭先覩之為快又豈復俟兹為之引而後顯耶衛公曰有是玄哉且子亦嘗遊吾師之門墻聆吾師之論議者屢矣吾且以子為頗造其閫閾者竊謂子必喜為之而吾與子復有平昔之好故以吾為介期子之不我拒也豈意過自謙抑誠非所望焉雖然必強為我著之既不獲請滋乃伏而思曰惟二師之教章章然著在人耳目故不待傳而傳矣念衛公者昔以詩書世其家實好學能文之士方年少時藉藉然有聲於場屋間晚節養高自晦甘於恬退不妄然諾今從丹陽公遊鄉里所共好之滋亦嘉其信道之篤而靈真子朱先生意復益堅故不敢復讓勉留其所謂好離鄉集再四披繹大率皆以刳心遺形忘情割愛嗇神挫鋭體虛觀妙為本其要在拯拔迷徒出離世網使人人如孤雲野鶴飄然長往擺脫種種習氣俾多生歷劫攀緣愛念如冰消瓦解離一切染著無一絲頭許凝滯則本來面目自然出現此全真之大旨也而凡夫之性計我我數人人蓬心蒿自認賊為子不識本源徒自執著虛妄流轉觸塗患生無有窮已為可憐憫故因目是集為好離鄉將使學人因文解義離其所染著離其所愛戀遍離一切諸有以至於離無所離之離真清真淨無染無著至實相境界則舉足下足無非瑶池閬苑矣一至於是則前所謂吾有何患者果何有哉愚之妄意以為如此因托此而勉為之序其他則備見於後總序此不復紀登州黃山王滋德務述
