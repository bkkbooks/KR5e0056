body:
  text: 重陽教化集序交四甚哉高尚至人世不常有也譬如景星慶雲非遇聖朝昌運則豈泛泛而見自太上出關之後有關令尹喜傳龔其道下逮鍾離處士吕洞賓陳圖南者皆相繼而出于今得重陽真人及丹陽先生亦接踵于世噫寥寥乎幾千百年之間此數君者未易多得可謂高尚至人世不常有者也丹陽先生馬宜甫本冠裳大姓富甲寧海自童稚時其仙風道骨灑落不凡已爲閭里欽重長從鄉校積學爲文便能入第一等忽遇重陽真人以一言悟意棄金帛如弊屣視妻子如路人幅巾杖屨之外一亡所有澹如孤雲悠然西邁以爲物外之遊意將不受幻化儻非夙緣定分了悟生死者其孰能與於此先生入道之後凡述作賦詠僅數百篇一一明達至理深得真筌門人高弟等命同其議裒綴成集門人靈真子朱抱一命工鏤板將行於世廼屬本府醫學博士韓扆同扶風馬川訪予求序諄諄懇切適有客在坐聞之則掀髯抵掌捨席趨進而問曰道家者流嘲弄風月固當如是乎予即應之曰噫嘻子亦悮矣且如明眼禪和欲傳妙道亦必垂一則語以示後之學者矧兹高尚至人力欲恢弘正教闡揚家風必以言語訓誡發爲文章而啓迪迷人庶有覺悟況此冷淡生活本是道人風味兼其間無一字塵凡氣殆非吟詠風月者無用之空言也子無誚焉客乃醒然改容悚赧請退曰僕誠淺陋言且過矣其徒所請既堅子盍序之予因作此俚語以書卷首大定癸卯冬十有一月上休日營丘府學正國師尹序丹陽先生遇重陽真人顧不異哉真人一性靈明夙悟前知自終南至於吾鄉地之相去三千餘里不辭徒步之遠而有知己之尋大定丁亥中元後一日真人抵郡竹冠弊衣携笠策杖徑入於余姪明叔之南園憩於遇仙亭丹陽先生馬公繼踵而至不差頃刻可謂不期而會焉二人相見禮揖而罷問應之際歡若親舊坐中設瓜唯真人從蔕而食衆皆異之丹陽先生先題詩於亭壁有沈醉無人扶之句真人讀而笑曰吾不遠數千里而來欲扶醉人爾又問如何是道對曰大道無形無名出五行之外是其道也清談終晷坐者聽之纚纚忘倦使人榮利之心驕氣淫志頓然釋去先生邀真人就城而館之待以殊禮日益恭謹卒至於成因命所居庵曰全真究其相遇之由若合符節苟非夙緣仙契孰能至於是哉先生系出扶風累世青紫吾鄉顯族也生而異禀識度不群其所居之第馬范二街相對與余世爲姻家有朱陳之好幼同嬉戲長同講習在郡庠數十年間花時月夕把酒論文未常不相從爲樂也先生資産豊厚輕財好施故能捨鉅萬之富揖真一之風真人遂以方便誘夫婦入道尚恐未從乃出神入夢以天堂地獄警之俾漸悟焉至於鎖庵百日密付玄機謂石火光陰難得易失如不早悟虚過一生下手速修猶太遲也謂攀緣妄想動成罪業索梨分而送之兼以栗芋賜之使知其離分而立遇也謂不捨冤親煩惱不斷去邑里之冗爲雲水之遊則鄉好離也凡詩詞往來賡唱迭和皆余一一目覩而親見之雖片言隻字無非發揮至奥冥合於希夷之趣也是以收聚所藏編次至三百餘篇分爲三帙共成一集丹陽門人靈真子朱抱一欲鏤板印行廣傳四方屬余爲序余忘其固陋即其意而序之既美其至人相遇之異又美其仙風勝槩可垂勸於後人使修真樂道之士玩味斯文豈小補哉大定癸卯寧海州學正范懌謹序仁人之用心也大矣哉身已適於正也欲天下之人皆去僞而歸真矣吾鄉丹陽先生之徒行是道者也先生舊爲寧海著姓祖宗皆以通儒顯官自弱冠之年遊庠序工詞章不喜進取好虚無樂恬淡已深悟玄元之理一日重陽真人自終南徒步而來一見而四目相視移時不已及開談笑語如舊交夙契或對月臨風或遊山翫水或動作閒宴靡不以詩詞唱和皆以性命道德爲意謂人生於電光石火如隙駒朝露不思治身妄貪名利儻修之不早若一入異境則雖悔可追常以是而深切勸勉冀一悟而超脫塵世顧丹陽依違而未决乃歎曰下手遲也遂入環堵令丹陽日親饋一食自十月朔而處所須唯文房四寶布衣草屨枕石而席海藻隔窗牖而求詩詞者接跡舉意即就略無思索當隆冬積雪之際和氣滿室居百日而方出嘗入夢於丹陽警之以天堂地獄又索梨栗芋每十日而分賜之自一以至五十五爲陰陽奇偶之數皆以詩詞往復酬和而顯其旨意於是丹陽夫婦開悟厭塵俗而樂雲水書誓狀願師事於真人兹分梨十化之由也自此易麤衣分三髻日從事於重陽視富貴如浮雲棄子孫如弊屣忻然違鄉里西遊梁汴之間盡傳其道不久而真人蛻昇遂西入關陜至終南重陽舊地築環堵以居焉無塵事之縈無火院之累專心致志以精窮内事雖祁寒酷暑不易常服或忽然長嘯而自歌自舞已得希夷之真趣故人心歸嚮無賢不肖咸願爲門弟子吾邦之士素慕其名德不憚數千里之遠往而求見者無虚日斯見離五行之外而超俗出世者也豈不曰好離鄉乎凡當時之一篇一詠不徒然而發皆所以勸戒愚蒙免沈溺於愛河慾海非專爲於己也故門人裒聚二先生之詩詞分爲三集上曰教化下手遲次曰分梨十化又其次曰好離鄉共三百餘篇玩其文究其理者則全真之道思過半矣自丹陽得遇殆今一紀有餘闡揚其教四民瞻禮多入道而從化下手遲三集雖關中已鏤板印行以道途遼邈傳於山東者百無一二而樂道之士罕得聞見一日丹陽門人靈真子朱抱一訪予曰先生因重陽真人之誘掖而棄俗究重陽真人之詩詞而悟道或以篇章或以言說廣行其教欲人人咸離迷津超彼岸得全真之理豈肯獨善其身哉兹見仁人之用心也廣大矣況此三集皆在吾鄉所作有目有耳者皆親聞見之實丹陽發跡之根抵而得道超脫之因盡在是也欲命工重雕印造以廣其傳俾世人皆得以披覽稽考知趨正而歸真矣求予爲文以叙其事予老矣昔與丹陽鄰里同在郡庠又相友好不唯常仰丹陽之道高德重抑又見門人之仁心弘遠也雖才學淺陋不足以形容其事然於義固不可辭姑以當時之親見以道其實其在他出處之跡顯異之行前數公序之詳矣此不復載大定癸卯寧海州學録趙抗謹序有生最靈者人人生至重者命性命之真弗克保全其爲人也末如之何語所以保全性命之真者非大道將安之乎世之人徒熹乎高爵之貴以爲榮豊貲之富以爲樂謂可以滋益性命於永久而不知富貴之中螘食華衣饒給於口體繁聲艷色侈奉於視聽心猿易放情竇難窒嗜慾耽荒皆因以萌驕奢淫泆靡所不至而勞神憊氣戕性賊命之患舉在於是良可鄙也豈侔乎邁世違凡栖心傃道黜聰明去健羨所樂者淡薄所守者清靜紛華弗容蠱於外情欲無所啓於内純純悶悶專氣致柔久而靈臺湛然神明自得全真契妙仙昇太清不其韙歟達是理者今吾鄉丹陽先生其人也先生本儒官名家金穴豪士自幼讀書聰敏之性異於髫堅輩迨冠染翰摛藻衡視秀造吾儕亦咸所推重每於暇日親朋宴集間多笑發名談雅有方外趣鄉黨以是知先生亦留道念之深也大定丁亥有重陽真人自終南而來一見先生謂宿有仙骨可與爲閬苑蓬壺逍遥侣乃温顔青眼傾蓋交談勸其遠俗脫塵亟探道妙先生初以家貲廣貯妻孥愛深未之遽從迨重陽多方警化屢示以詩詞激切勸諭識其玄機微旨皆神仙語忽爾覺悟願執弟子禮從真人遊將所示篇什依韻賡酬以形服教進道永矢弗渝之意己丑歲重陽西返道徒從焉先生乃銳然捐産捨家違妻離子顛髻體褐躡後而行徑入梁汴間栖泊朞月重陽謂吾道之玄微授先生者已竟乃蟬蛻仙去先生復絜徒西上之終南訪重陽舊庵所築環堵而居遵師踵武養道闡教居人及鄰州不以長幼歆慕而宗師者無慮千餘輩閱祀逾紀至壬寅仲夏先生默想鄉邦遐僻之地意其苦海愚迷喪真積釁者衆即振策東歸深慈悲之念躬拯化之勤庶使人人悟過修真俱登道岸杖屨所至亦靈異之徵屢昭臨井呪泉而泉即變甘救旱祈兩而雨遽應降修醮儀而彩雲集於庵上焚漁網而海市見於臘天餘多異跡謂非顯然衆所共見者難以縷形遂致遠邇之人咸欽風服化其丱髮緼袍願受教爲門弟子者日差肩而前不可數計先生既化行如是復想其遇師得道之始與重陽唱和詩詞數百篇皆發揮道妙足以爲破迷解惑超凡度世之梯航要廣傳於世俾玩辭味旨者率醒心明道遠塵勞之苦全性命之真異時俱爲丹臺籍客也曩者雖門人已嘗編集分卷命名印施陜右尚慮其傳之未周及知其中多有舛謬字句由是門人再行編集詳加讎正欲於鄉中募工鏤板普傳四方委丹陽門人靈真子朱抱一辦其事一日朱公惠臨圭竇喻予作序予自商埤汙椎魯奚足以發揚玄旨固辭弗可遂勉摭先生遇師得道闡化之崖略濡毫燥吻作淟涊下俚語姑酬其請云時大定癸卯歲寧海州鄉貢進士劉孝友序嘗聞之得其道則仙可成遇其人則道可得以此知仙之難成道之難得人之尤難遇也彼道家者流例多不遇至人徒學般運嚥漱區區屑屑殊可笑也夫至人之道其甚易知其甚易行所傳於人者豈徒然哉必視乎有仙風道骨又知乎聯夙昔之契雖相去數千里之遠必勤勤懇懇付之道而後已此有以見重陽之於馬公也重陽蚤遇至人口傳至道乃結廬於甘水之上既而雲遊山東直抵寧海蓋預知有人可以傳道也一見馬公清契道合其一話一言未嘗不以下手速修爲喻然馬公寧海鉅族家貲千萬子孫詵詵雖素樂恬澹亦未易猛𢬵也重陽乃於孟冬之首鏁庵百日出神入夢以天堂地獄爲之警動又嘗以賜馬公梨一枚詩一篇其後十日索梨一枚分而爲二又賜以芋栗各有其數冥合陰陽奇偶之妙無非託物以喻意假言而明理馬公一旦開悟以所賜詩頌依韻賡和欣然棄家易於去弊屣矣於是師重陽西遊汴梁之間重陽既傳道於馬公屬以後事遂尸解仙去馬公果能敷暢玄風發揚妙理遠近奉教者不可勝數其前日賡唱詩頌有欲願見而不可得者門人遂收散亡共三百餘篇欲鏤板印行傳之四方偉哉用心之廣也一日馬公門人靈真子朱抱一携下手遲集以求序於余曰某欲刊行斯文意使棲心向道之士諷其言辭味其旨趣以之破迷解惑皆知石火光中雖務速修猶太遲也余聞是言加以素慕全真之風兼目覩其實不能以鄙陋爲拒姑叙其大槩云時癸卯歲寧海州東牟鄉貢進士梁棟謹序夫全真之教妙矣其道以無爲爲本以清浄爲宗其旨易知其實易從然世之人類履之而無終行之而鮮久者何哉以其信之不篤執之不固抱兒女子之惑無烈丈夫之志徒眷眷於火宅不能高蹈遠引而去故也今丹陽先生其能終始是道而得至於仙者歟先生世居東牟資産鉅萬貌偉神秀無一點塵俗氣自總角知書澹乎無仕進意混處閭里德不外耀鄉人以是慕之已而重陽真人徒步出關直造寧海具謂與先生有夙昔之契因警之以詩悟之以詞要與俱遊於八極之表先生始而疑中而信又終而從遂執弟子之禮而師焉一旦撥置家務棄去井邑而偕爲汴梁之行無復有繫眷念雖使涉危蹈傾冒艱履困竟志類鐵石確然而不之變也以是而盡能傳重陽公之道若夫陰陽造化之理性命保全之術點化傳度之訣無爲清浄之旨靡不洞索而通明之以至於重陽歸真卒赴其託而主其教焉故全真之風於今廣行無智愚賢不肖願從而歸之者惟恐其後先生事師凡四年而師終師終凡十餘年而又不返則先生離鄉之志可知矣然先生之離鄉豈徒然哉蓋有說在焉僕爲先生里人廼得其詳方先生之遇也心雖許之從而身未之逮也姑以私第南館名其庵而居一日重陽真人招先生而誨之曰子知學道之要乎要在於遠離鄉而已遠離鄉則無所係無所係則心不亂心不亂則欲不生無欲欲之是無爲也無爲爲之是清淨也以是而求道何道之不達以是而望仙何仙之不爲今子之居是邦也私故擾擾不能息於慮男女嗷嗷不能絶於聽紛華種種不能掩於視吾懼終奪子之志而無益於吾之道也子其計之先生乃懼而悟顧而笑即日拂袖去用能斷俗緣剔塵染寂然與物無著杳然與物無累乘雲馭風飄飄爲神仙中人矣先生自受師前言而至於了達然不敢嘿默自蓄於胸中特取疇昔唱和三帙舉其一以名之曰好離鄉庶覺諸未悟者必式此以爲進道之階噫先生之用心可謂仁且大矣僕敢不竭慮而讚揚之因丹陽門人靈真子朱抱一求序姑序其萬一云大定癸卯歲寧海州東牟鄉貢進士劉愚之謹序
