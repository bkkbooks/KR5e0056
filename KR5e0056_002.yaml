front:
  text: 重陽教化集卷之二交五
  hash: sha256:273272a9f1d78a5712921f371a70a7db1423f58c69b01cc7903cb3cfc618e3fe
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0056_HFL_002-001a, image: hfl/0796/0796-005.png}
body:
  text: 終南山重陽子王嚞撰玉女邀仙輩終南一遇醴邑相逢兩次凡心蒙滌便話修持重談調攝莫使暗魔偷滴養氣全神寂禀逍遙自在間間遊歷覽清淨常行允迪應用刀圭節要開劈三田會靈明結作般般光輝是績先向天涯海畔訪友尋眀得箇知音成𨵙直待恁時相將同步處處嬉嬉尋覓暗裏瞷瞷檄覷你為作如何鋒鏑會舉箭張弓對敵百邪千魅戰回純皙無愁戚方堪教可傳端的丹陽次韻我今得遇把氣財并酒色心中常滌縛馬擒猿牢封緊閉唯恐精光覷滴漸漸知空寂况余今已向下波年歷當歸道相宜進迪俗念塵情慧劍頻劈憑師教通關節要功夫勤勤妙績調引烏龜赤鳳般運青龍白虎同成幽𨵙箇內得乎真歡真樂更不間搜間覓應自然符檄烹鍊三丹靈鋒鳴鏑便散盡妖魔罷敵永成嘉趣性增明皙無憂戚蓬萊路幸知端的香山會白光生青艷至紅輝總好騰玄耀妙黃深奧般般彩色把明珠覆燾晴空外來往仙道封成永號便受玉皇宣誥雲霞裏上真唯到香山會聚發瓊言闡道同歸去長住三島丹陽次韻木金交天地活真真漸好澄清湛寂深通奧祥光瑞氣把丹砂覆燾方知得人能弘道仙承妙號定是受金書誥玄中妙淨中來到心通意曉這天機大道當行教薦赴蓬島贈丹陽這箇為根本靈元要至誠搜真物外景滅盡世間情四序傳中氣三光在上明如通顛倒法何慮不圓成丹陽繼韻風仙來化我萬荷啓丹誠認正本師教焉能著世情心中無罣礙性內得圓明永永常清淨仙名稱道成化丹陽凡人修道先須依此一十二箇字斷酒色財氣攀緣愛念憂愁思慮讀晉真人語録大凡學道不得殺盜飲酒食肉破戒犯願知丹陽喫酒贈頌道成尚喫酒豈惜千年壽訪飲若依前不過四十九丹陽繼韻誓戒槽漿酒玉液增靈壽凡聖兩俱忘得得真九九令丹陽下山權與陸仙作伴解寃結我行符水公修藥餌一居山一居鄽市兩處崇真暗相洽即非彼此無為漏共成不二扶風儒士同為教旨辟得正上合天意行滿功成去蓬萊却尋舊止如今且休言異寄丹陽繼韻風仙符水陸公藥餌兩處住一山一市遣鈺居鄽敢相違便當離此懷真一難為有二豫非秀士道通奧旨認根源伏降心意縛馬擒猿覺狂遊喝聲便止休相侮假身是寄七寶玲瓏人人每日問我要求玄你便待做神仙四四一十六箇字二十八字在衆賢會得之時也未然既要修行先念樂花蓮次棄了冗家緣物物拈來俱不染打破般般出上田一道光明入碧天丹陽繼韻至愚至魯怎曉妙中玄便再拜告風仙口訣金身長丈六二十八宿會聖賢此理方知合自然坎虎離龍蟠繞五方蓮漸漸得好因緣火裏木人能採藥海底泥牛會種田迸出靈光入洞天金鼎一溪雲對月成詞句臨風寫頌章一枝銀管瑞中祥隨手染清凉玉洞門開深淺寶樹花分香篆蓬萊仙島是吾鄉宴罷後瓊堂丹陽次韻淨裏傳章句清中悟句章通玄達妙得嘉祥自是絶炎凉玉户三封清淺金鼎一溪雲篆蓬瀛方丈是家鄉卧月醉雲堂上丹霄向終南成遭遇做風狂便遊歷海上嘉祥間間得得任從詞曲作詩章自然神氣共交結認正心香真清淨唯清湛還清徹處清凉赤青黑白又兼黃五般彩色近來圍罩寶珠光這回應許碧霄上明耀無方丹陽次韻遇風仙心開悟騁顛狂黜妻屏子便迎祥逍遙坦蕩恣情吟詠謾成章就中行化覓知友同共聞香烹丹鼎下丹結中丹熱大丹凉不須鍊白更燒黃自然玉性萬般霞彩射人光上丹霄去住蓬島永永圓方踏雲行激發丹陽東海汪洋西山詳審金鈎釣得歡無恁一頭活樂大鯨魚萬鱗燦爛鋪白錦隨我遨遊水雲信任青山緑水相過甚張公喫酒李公來李公奪了張公飲丹陽次韻懇告玄言師前重審傳來祕訣元來恁方知我是一鼇魚素鱗晃日如鋪錦坦蕩無拘逍遙恣任利名識破干求甚專歸物外下功夫清心淨意刀圭飲四果頌果來海角天涯果應師旨夷希果得前生知友果然合我心機丹陽繼韻因遇决離海涯因悟怨事用希因得風仙至理因曉天發殺機贈丹陽為人須悟塵勞汨清淨心中真寶物奪得驪龍口內珠便教走上崑崙窟丹陽次韻心昭性著無塵汨識得元初至真物參從風仙雲水遊將來决住三山窟憶王孫誡丹陽語言人云口是禍之門我道舌為禍本根不語無言絶討論性難昏便是長生保命存丹陽又韻方知口是是非門緊閉牢藏舌禍根訓我無言更不論削迷昏性命從今永永存引丹陽上街求乞白為骸骨紅為肌紅白粧成假合尸昨日盡呼重陽子今朝都看伴哥兒别軀異體皆非悟换面更形總不知世上枉鋪千載事百年恰似轉頭時丹陽繼韻火風地水合為肌只是愚迷走骨尸幸遇風仙修道德致令馬鈺棄妻兒玄機傳向心中悟妙訣授於性內知直指秦川雲水去暗修功行應天時街中求乞圈眼王三乞覓時被人呼作害風兒五般彩色於身見一點光明只自知貼觀已收八句字指期須顯七言詩長街兩面諸豪富不道蠶歸是阿誰丹陽又韻因緣緣合正當時師父來尋物外兒傳得妙玄唯自悟暗修功行望天知上街求乞辭家計下筆揮成捨俗詩除了談公并馬鈺後來惺灑未知誰踏雲行昨日青巾今朝紅角脂腮粉面别軀殼改頭换面有誰知更形易體無人覺奉勸諸公詞中想邈百年迅速如雷雹早為下手鍊精神頓安爐竈成丹藥丹陽繼韻因遇風仙頭分丫角從今陡頓忘形殼攀緣愛念上心來被豫慧照先知覺景滅澄眀道光遙邈爐中露結靈靈雹功成專待紫書來胎仙捧出長生藥激發丹陽百日扃門非顯功只圖足下出凡籠癡頑縱有長拖戴决烈全無沒始終公意休令時復想我心不與日前同大家相見如新語歡喜分離西又東丹陽繼韻相親師父望傳功感謝提携已出籠但願有鄰而有德休愁無始亦無終時聞只見塵埃昧日久方知志氣同莫把山侗容易捨忍將宿契各西東贈丹陽挈丹陽居崑嵛山煙霞洞因心未死于是感疾患偏頭痛其痛不可忍有若斧劈令其下山在家調治其痛愈甚有人上山報云某來時馬先生已痛死聞之因鼓掌大笑曰我來欲化為神仙肯教死了為他不信感此疾有詩云清淨修行合上真敢將此語昧天神為公不信偏頭痛顧我無緣正法親苦口怎知良藥味甘心猶戀入迷津如今轉入塵勞夢難做惺惺睡覺人丹陽次韻專心專認本來真修鍊精光氣與神既悟雲霞為伴侣肯思兒女結冤親擘開世網鑿開路躍出凡籠跳出津極謝本師深教悔不磨不琢不成人聞丹陽欲上崑嵛山以詩寄之公住山時我下山我心終是厭愚頑斷弦無續寧成曲覆水難收已不還昔日謾傳千口氣經今轉隔萬重關不如只作塵勞客相見之時免厚顔丹陽次韻戀他愛海與恩山豈覺癡心忒煞頑深謝風仙相引出莫愁馬鈺却歸還要登雲路開瓊路牢閉金關闡玉關烹鍊大丹丹不漏自然得見內容顔鍛鍊丹陽財色心從今休更問修行怎奈燈蛾戀火坑既是鑿開赤鳳髓已知走了黑龜精般般見處非無意物物拈來總有情前有深潭闊萬頃如能跳過得殘生丹陽繼韻悟來一志在西行趖避家緣罪業坑心淨緣擒猿與馬神清因鍊氣和精身如野鶴無些事性似孤雲有甚情參從本師歸物外逍遙坦蕩證無生詩與丹陽猶豫猖狂忒軟頑如今難以舞胎仙我機枉設三千里公罪重增十百年歡喜定將煩惱對憂愁只與是非牽姓名已録酆都部他日臨頭怎奈賢丹陽繼韻不開不悟騁愚頑省覺來來志在仙道眼剔開能久視塵心灰盡得長年便擒猛虎水中戲却把蛟龍火裏牽異日功成歸上界與師同處自然賢余在煙霞洞與丹陽抵足同眠向曉因令丹陽舒過手來摸我後腰間近日生起疥有半指厚緣我急圖爾等作黃鶴洞中仙有箇害風兒海上尋良價只為心頭忒緊圖意馬隘惹出渾身疥款款細搜求日月年時賽遂得中央四寶珠祿馬快走入關西界丹陽次韻三髻馬山侗未稱真奇價瓷縱心猿放耍顛馬兒隘憋出吾師疥驀想死生危宿世因緣賽寶內欣然占一珠馬風快奔赴秦川界余在崑嵛山趕丹陽下山不要同處後令丹陽燒誓狀以詩贈之擲下金鈎恰一年方吞香餌任綸牽玉京山上為鵬化隨我扶搖入洞天丹陽繼韻風仙化我已經年悟徹吞鈎任線牽參從本師雲外去功成决上大羅天藏頭詩德新芽别有由端詩曲愛藏頭黃合醬憑鹽粒菉和醅作麴仇轉丹砂隨日旦靈真性覺風流清日現澄堪誼甫相從上玉樓丹陽俗字宜甫丹陽繼韻向妻男取解由園付與便回頭方風送當歸旦志真修合避仇我俱忘得因果金運轉逐清流中養火生祥氣雲散斜陽返照樓拆起丿字藏頭詩時甚物得追陪耳香瞻四事催是人非應莫管高官顯更休猜瞳認取金烏赫氣騰丞玉兔材火銀泉相溉濟心箇箇到蓬萊拆起來字丹陽又韻來往往日相陪訣方知性上催我俱忘無俗念神安靜得真猜龍爪拓靈靈伯虎口吞燦燦材秀金生光彩結人决要離東萊同前無夢令藏頭趁心頭事少綻玉花不老要認良時艷分明北道腦腦照返餐芝草拆起早字丹陽繼韻載憂多歡少所謂父母併亡獨擔火院遇修仙無老者離家緣蟻穿珠通道腦首腦郎田生瑞草拆起十字歌贈丹陽神為宗兮氣為祖不須紐捏鳴天鼓常交龍虎往來行引動胎仙自歌舞歌得喬舞得喬誰人解得此般喬領天男長天女不藉榮華棄田土也不餐也不睡不須氈不須被惺惺灑灑離凡地又似癡又似俏本來面目須明曉曠代劫來無箇知只知名利是便宜你休嗔你休喜今日分明說與你雲中清雨細如絲滋潤靈苗在根底丹陽繼韻頭分丫髻尋宗祖手拍肚皮打喬鼓反老還童見本源兩腳輕狂街上舞行也喬坐也喬喬來喬去似王喬也無男也無女也無妻妾并田土飢來餐困來睡也無氈也無被自在逍遙只恁地半似癡半似俏半凝半俏無箇曉自家自得自心知不問人前宜不宜任人嗔任人喜人喜人嗔誰采你落魄婪耽恣意喬喬話風狂直到底重陽教化集卷之二
